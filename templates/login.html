<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AI Trainer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body class="auth-body">

  <div class="auth-box">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <div class="auth-logo-text">AI <span>TRAINER</span></div>
    </div>

    <h2>Welcome Back</h2>
    <p class="auth-subtitle">Log in to continue your fitness journey.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">

      <div class="input-group">
        <label for="username">Username</label>
        <input id="username" name="username" placeholder="Enter your username" autocomplete="username">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password">
      </div>

      <button type="submit">LOGIN</button>

    </form>

    <div class="auth-footer">
      Don't have an account?
      <a href="/register">Create one</a>
    </div>

  </div>

</body>
</html>
