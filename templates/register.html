<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — AI Trainer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body class="auth-body">

  <div class="auth-box">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <div class="auth-logo-text">AI <span>TRAINER</span></div>
    </div>

    <h2>Create Account</h2>
    <p class="auth-subtitle">Start your AI-powered fitness journey today.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">

      <div class="input-group">
        <label for="username">Username</label>
        <input id="username" name="username" placeholder="Choose a username" autocomplete="username">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Create a strong password" autocomplete="new-password">
      </div>

      <button type="submit">CREATE ACCOUNT</button>

    </form>

    <div class="auth-footer">
      Already have an account?
      <a href="/">Log in</a>
    </div>

  </div>

</body>
</html>
