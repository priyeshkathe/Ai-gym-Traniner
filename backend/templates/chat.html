<!DOCTYPE html>
<html>
<head>

<title>AI Gym Trainer</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
}

/* LEFT PANEL */

.sidebar{
width:250px;
background:#202123;
color:white;
padding:20px;
overflow-y:auto;
}

.sidebar h2{
margin-top:0;
}

.chat-item{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.chat-item:hover{
background:#343541;
}

/* RIGHT PANEL */

.main{
flex:1;
display:flex;
flex-direction:column;
background:#f7f7f8;
}

/* CHAT AREA */

.chat-area{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
margin-bottom:20px;
}

.user{
font-weight:bold;
color:#1a73e8;
}

.ai{
background:white;
padding:12px;
border-radius:6px;
margin-top:5px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

/* INPUT AREA */

.input-box{
display:flex;
padding:15px;
border-top:1px solid #ddd;
background:white;
}

.input-box input{
flex:1;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:5px;
}

.input-box button{
margin-left:10px;
padding:12px 20px;
background:#10a37f;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- LEFT CHAT HISTORY -->

<div class="sidebar">

<h2>Chats</h2>

<div id="history"></div>

</div>


<!-- RIGHT CHAT WINDOW -->

<div class="main">

<div id="chat" class="chat-area"></div>

<div class="input-box">

<input id="question" placeholder="Ask your workout question...">

<button onclick="askAI()">Send</button>

</div>

</div>

<script>


/* LOAD CHAT HISTORY */

fetch("/chat-history")
.then(res=>res.json())
.then(data=>{

const history=document.getElementById("history")

data.history.forEach(chat=>{

const div=document.createElement("div")

div.className="chat-item"

div.innerText=chat.question

history.appendChild(div)

})

})


/* SEND QUESTION */

function askAI(){

const question=document.getElementById("question").value

const chat=document.getElementById("chat")

chat.innerHTML+=`
<div class="message">
<div class="user">You:</div>
<div>${question}</div>
</div>
`

fetch("/ask-ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({question:question})
})
.then(res=>res.json())
.then(data=>{

let html=`
<div class="message">
<div class="user">AI Trainer:</div>
<div class="ai">
`

if(data.workout.length===0){

html+="No workout generated."

}else{

data.workout.forEach(w=>{

html+=`
<b>${w.exercise}</b><br>
${w.sets} sets • ${w.reps} reps<br><br>
`

})

}

html+=`</div></div>`

chat.innerHTML+=html

})

}

</script>

</body>
</html>
